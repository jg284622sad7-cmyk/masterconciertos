<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Master Conciertos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        #panel-privado { display: none; }
        .text-green-neon { color: #00ff00; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }
    </style>
</head>
<body class="bg-zinc-100 font-sans">

    <div id="seccion-login" class="min-h-screen flex items-center justify-center bg-black p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black mb-6 uppercase italic"><span class="text-purple-600">MASTER</span> ADMIN</h1>
            <input type="text" id="user" placeholder="Usuario" class="w-full border p-3 rounded-xl mb-4 text-center outline-none focus:border-purple-500">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full border p-3 rounded-xl mb-4 text-center outline-none focus:border-purple-500">
            <button onclick="validarAcceso()" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-zinc-800">ENTRAR</button>
            <p id="error" class="text-red-500 text-xs mt-4 hidden italic">Datos incorrectos.</p>
        </div>
    </div>

    <div id="panel-privado">
        <nav class="bg-black text-white p-4 flex justify-between items-center shadow-xl">
            <h1 class="text-lg font-bold italic text-yellow-500 uppercase">Master Admin Cloud</h1>
            <div class="flex items-center gap-6">
                <div class="text-sm bg-zinc-900 px-4 py-2 rounded-full border border-zinc-700">
                    <span class="text-zinc-400 uppercase text-[10px] tracking-widest mr-2">Tráfico:</span>
                    <span id="val-visitas" class="text-green-neon font-black text-lg tabular-nums">0</span>
                </div>
                <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Salir</button>
            </div>
        </nav>

        <main class="container mx-auto mt-10 p-4">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-zinc-200">
                        <div class="flex justify-between items-center mb-4">
                            <h2 id="titulo-form" class="text-xl font-black uppercase text-black">Nuevo Evento VIP</h2>
                            <button id="btn-cancelar" type="button" onclick="cancelarEdicion()" class="hidden text-xs bg-red-100 text-red-600 px-3 py-1 rounded font-bold uppercase">Cancelar Edición</button>
                        </div>

                        <form id="form-evento" class="space-y-4">
                            <input type="text" id="nombre" required placeholder="Nombre del Artista / Evento" class="w-full border border-zinc-300 p-3 rounded-xl outline-none focus:border-yellow-500">
                            
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="ubicacion" required placeholder="Ciudad" class="w-full border border-zinc-300 p-3 rounded-xl outline-none focus:border-yellow-500">
                                <input type="text" id="estadio" placeholder="Estadio / Lugar" class="w-full border border-zinc-300 p-3 rounded-xl outline-none focus:border-yellow-500">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <input type="date" id="fecha" required class="w-full border border-zinc-300 p-3 rounded-xl outline-none text-sm text-zinc-600 focus:border-yellow-500">
                                
                                <select id="estado" class="w-full border border-zinc-300 p-3 rounded-xl outline-none text-sm font-bold bg-zinc-50 cursor-pointer">
                                    <option value="disponible" class="text-green-600">🟢 Disponible</option>
                                    <option value="por_agotar" class="text-orange-500">🟠 Por Agotarse</option>
                                    <option value="agotado" class="text-red-600">🔴 Agotado</option>
                                </select>
                            </div>

                            <div class="flex items-center gap-3 bg-zinc-50 p-3 rounded-xl border border-zinc-200">
                                <input type="checkbox" id="destacado" class="w-5 h-5 cursor-pointer">
                                <label for="destacado" class="text-xs font-bold uppercase text-zinc-700 cursor-pointer">⭐ Marcar en sección de Destacados</label>
                            </div>

                            <div class="space-y-2 bg-zinc-50 p-3 rounded-xl border border-zinc-200">
                                <label class="block text-[10px] uppercase font-bold text-zinc-500">Poster Oficial <span id="hint-foto" class="text-purple-600 hidden">(Deje vacío para no cambiar)</span></label>
                                <input type="file" id="foto" accept="image/*" class="w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-black file:text-white hover:file:bg-zinc-800 cursor-pointer">
                                
                                <div class="h-px bg-zinc-200 my-2"></div>
                                
                                <label class="block text-[10px] uppercase font-bold text-zinc-500">Video Holograma (Opcional - MP4 Ligero)</label>
                                <input type="file" id="videoPromo" accept="video/mp4,video/webm" class="w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700 cursor-pointer">
                            </div>

                            <button type="submit" id="btn-submit" class="w-full bg-black text-yellow-500 font-black py-4 rounded-xl shadow-md uppercase tracking-widest text-sm hover:bg-zinc-900 transition-colors">PUBLICAR EN MATRIX</button>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                        <h2 class="text-xl font-black mb-4 uppercase">Publicidad Pequeña</h2>
                        <form id="form-publi" class="space-y-4">
                            <input type="file" id="foto-publi" accept="image/*" required class="w-full text-xs">
                            <button type="submit" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl hover:bg-yellow-400">SUBIR PUBLICIDAD</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-zinc-200">
                        <h2 class="text-xl font-black mb-4 uppercase">Cartelera en Vivo</h2>
                        <div id="tabla-admin" class="space-y-3 max-h-[600px] overflow-y-auto pr-2"></div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-zinc-200 shadow-sm">
                        <h2 class="text-xl font-black mb-4 uppercase">Publicidad Activa</h2>
                        <div id="lista-publi" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAA83QincIrW2GyUWEcDkCLNAz6DAfGpPo",
            authDomain: "masterconciertos.firebaseapp.com",
            databaseURL: "https://masterconciertos-default-rtdb.firebaseio.com",
            projectId: "masterconciertos",
            storageBucket: "masterconciertos.firebasestorage.app",
            messagingSenderId: "819196526862",
            appId: "1:819196526862:web:27be1a0eee330d76a4975f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let eventoEditandoId = null;
        let fotoVieja = null;
        let videoViejo = null;

        function validarAcceso() {
            if (document.getElementById('user').value === "usuario" && document.getElementById('pass').value === "1234") {
                document.getElementById('seccion-login').style.display = 'none';
                document.getElementById('panel-privado').style.display = 'block';
                cargarDatos();
            } else { document.getElementById('error').classList.remove('hidden'); }
        }

        const leerArchivoAsincrono = (file) => {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        };

        function cargarDatos() {
            db.ref('eventos').on('value', snap => {
                const lista = document.getElementById('tabla-admin');
                lista.innerHTML = '';
                snap.forEach(child => {
                    const ev = child.val();
                    const key = child.key;
                    
                    let badgeDestacado = ev.destacado ? `<span class="bg-yellow-100 text-yellow-800 text-[9px] px-2 py-0.5 rounded border border-yellow-300 ml-2">⭐ DESTACADO</span>` : '';
                    let badgeEstado = '';
                    if(ev.estado === 'agotado') badgeEstado = `<span class="bg-red-100 text-red-700 text-[9px] px-2 py-0.5 rounded border border-red-300 ml-2">SOLD OUT</span>`;
                    else if(ev.estado === 'por_agotar') badgeEstado = `<span class="bg-orange-100 text-orange-700 text-[9px] px-2 py-0.5 rounded border border-orange-300 ml-2">ÚLTIMAS</span>`;
                    
                    let badgeVideo = ev.videoPromo ? `<span class="bg-purple-100 text-purple-800 text-[9px] px-2 py-0.5 rounded border border-purple-300 ml-2">🎥 VIDEO</span>` : '';

                    lista.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-200">
                        <div class="flex items-center gap-4">
                            <img src="${ev.foto}" class="w-12 h-12 object-cover rounded-lg">
                            <div>
                                <h4 class="font-black text-sm uppercase">${ev.nombre} ${badgeDestacado}</h4>
                                <p class="text-[10px] text-zinc-500 uppercase font-semibold mt-1">📍 ${ev.ubicacion} ${ev.estadio ? ' | 🏟️ '+ev.estadio : ''} ${badgeEstado} ${badgeVideo}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${key}')" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 text-[10px] font-bold transition-colors">EDITAR</button>
                            <button onclick="eliminar('eventos/${key}')" class="text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg border border-red-200 text-[10px] font-bold transition-colors">BORRAR</button>
                        </div>
                    </div>`;
                });
            });

            db.ref('publicidad').on('value', snap => {
                const lista = document.getElementById('lista-publi');
                lista.innerHTML = '';
                snap.forEach(child => {
                    lista.innerHTML += `
                    <div class="relative group overflow-hidden rounded-xl border">
                        <img src="${child.val().foto}" class="w-full h-24 object-cover">
                        <button onclick="eliminar('publicidad/${child.key}')" class="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full text-xs font-bold">X</button>
                    </div>`;
                });
            });

            db.ref('visitas').on('value', snap => {
                document.getElementById('val-visitas').innerText = snap.val() || 0;
            });
        }

        // MOTOR DE EDICIÓN
        function prepararEdicion(key) {
            db.ref('eventos/' + key).once('value').then(snap => {
                const ev = snap.val();
                document.getElementById('nombre').value = ev.nombre;
                document.getElementById('ubicacion').value = ev.ubicacion;
                document.getElementById('estadio').value = ev.estadio || '';
                document.getElementById('fecha').value = ev.fecha;
                document.getElementById('estado').value = ev.estado || 'disponible';
                document.getElementById('destacado').checked = ev.destacado || false;

                document.getElementById('foto').required = false;
                document.getElementById('hint-foto').classList.remove('hidden');

                eventoEditandoId = key;
                fotoVieja = ev.foto;
                videoViejo = ev.videoPromo || null;

                document.getElementById('titulo-form').innerText = "EDITAR EVENTO";
                document.getElementById('btn-submit').innerText = "ACTUALIZAR EN MATRIX";
                document.getElementById('btn-cancelar').classList.remove('hidden');
                
                window.scrollTo(0,0);
            });
        }

        function cancelarEdicion() {
            eventoEditandoId = null;
            fotoVieja = null;
            videoViejo = null;
            document.getElementById('form-evento').reset();
            document.getElementById('foto').required = true;
            document.getElementById('hint-foto').classList.add('hidden');
            document.getElementById('titulo-form').innerText = "Nuevo Evento VIP";
            document.getElementById('btn-submit').innerText = "PUBLICAR EN MATRIX";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        // SUBIDA DE EVENTOS
        document.getElementById('form-evento').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "PROCESANDO..."; btn.disabled = true;

            try {
                const fileFoto = document.getElementById('foto').files[0];
                const fileVideo = document.getElementById('videoPromo').files[0];

                const fotoBase64 = await leerArchivoAsincrono(fileFoto);
                const videoBase64 = await leerArchivoAsincrono(fileVideo);

                const datosEvento = {
                    nombre: document.getElementById('nombre').value,
                    ubicacion: document.getElementById('ubicacion').value,
                    estadio: document.getElementById('estadio').value,
                    fecha: document.getElementById('fecha').value,
                    estado: document.getElementById('estado').value,
                    destacado: document.getElementById('destacado').checked,
                    foto: fotoBase64 || fotoVieja,
                    videoPromo: fileVideo ? videoBase64 : videoViejo 
                };

                if(eventoEditandoId) {
                    await db.ref('eventos/' + eventoEditandoId).update(datosEvento);
                    alert("Evento actualizado correctamente.");
                    cancelarEdicion();
                } else {
                    await db.ref('eventos').push(datosEvento);
                    document.getElementById('form-evento').reset();
                    alert("Evento publicado con éxito.");
                }

            } catch (error) {
                alert("Hubo un error al procesar.");
            } finally {
                btn.innerText = eventoEditandoId ? "ACTUALIZAR EN MATRIX" : "PUBLICAR EN MATRIX";
                btn.disabled = false;
            }
        });

        document.getElementById('form-publi').addEventListener('submit', e => {
            e.preventDefault();
            const file = document.getElementById('foto-publi').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                db.ref('publicidad').push({ foto: reader.result }).then(() => {
                    document.getElementById('form-publi').reset();
                });
            };
            reader.readAsDataURL(file);
        });

        function eliminar(ruta) { 
            if(confirm('¿Seguro que desea eliminar esto?')) db.ref(ruta).remove(); 
        }
    </script>
</body>
</html>
