<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Conciertos | Reventa de Boletería de Élite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Syncopate:wght@700&display=swap');

        body { 
            background-color: #030303; 
            position: relative;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            z-index: 0;
            perspective: 1000px; 
        }

        .font-syncopate { font-family: 'Syncopate', sans-serif; }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(168, 85, 247, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -4; pointer-events: none;
        }

        .ambient-light {
            position: fixed; border-radius: 50%; filter: blur(150px); z-index: -3;
            pointer-events: none; animation: float-light 15s infinite alternate ease-in-out; opacity: 0.8;
        }
        .light-purple { width: 60vw; height: 60vh; background: rgba(168, 85, 247, 0.18); top: -15%; left: -10%; }
        .light-gold { width: 70vw; height: 70vh; background: rgba(212, 175, 55, 0.12); bottom: -25%; right: -15%; animation-duration: 20s; animation-direction: alternate-reverse; }

        @keyframes float-light { 0% { transform: translateY(0px) rotate(0deg) scale(1); } 100% { transform: translateY(50px) rotate(10deg) scale(1.1); } }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none;
            background: radial-gradient(circle, rgba(212,175,55,0.8) 1.5px, transparent 1.5px) 10% 20%, radial-gradient(circle, rgba(168,85,247,0.8) 1px, transparent 1px) 80% 40%, radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px) 40% 60%, radial-gradient(circle, rgba(168,85,247,0.6) 2px, transparent 2px) 20% 80%;
            background-size: 250px 250px; animation: move-particles 80s linear infinite;
        }
        @keyframes move-particles { 0% { background-position: 0 0; } 100% { background-position: 250px -250px; } }
        
        .logo-container { display: inline-block; position: relative; perspective: 1000px; }
        .char-wrapper { display: inline-block; transition: transform 1.5s cubic-bezier(0.25, 1, 0.3, 1), opacity 1.5s, filter 1.5s; transform-style: preserve-3d; }
        #super-logo.scattered .char-wrapper { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(var(--ts)); opacity: 0.15; filter: blur(5px); pointer-events: none; }
        
        /* 🔥 SOLUCIÓN APLICADA AQUÍ (background-clip: text;) */
        .char-master, .char-conciertos { display: inline-block; background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shine-gradient 4s linear infinite, char-float 3s ease-in-out infinite alternate, char-spin-exotic 6s infinite; transform-style: preserve-3d; }
        
        .char-master { background-image: linear-gradient(to right, #c084fc, #7e22ce, #c084fc); filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5)); }
        .char-conciertos { background-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
        @keyframes shine-gradient { to { background-position: 200% center; } }
        @keyframes char-float { 0% { transform: translateY(0px); } 100% { transform: translateY(-5px); } }
        @keyframes char-spin-exotic { 0%, 75% { transform: rotateY(0deg); } 90% { transform: rotateY(360deg); } 100% { transform: rotateY(360deg); } }
        .char-wrapper:nth-child(1) .char-master { animation-delay: 0.1s; } .char-wrapper:nth-child(2) .char-master { animation-delay: 0.2s; } .char-wrapper:nth-child(3) .char-master { animation-delay: 0.3s; } .char-wrapper:nth-child(4) .char-master { animation-delay: 0.4s; } .char-wrapper:nth-child(5) .char-master { animation-delay: 0.5s; } .char-wrapper:nth-child(6) .char-master { animation-delay: 0.6s; }
        .char-wrapper:nth-child(8) .char-conciertos { animation-delay: 0.7s; } .char-wrapper:nth-child(9) .char-conciertos { animation-delay: 0.8s; } .char-wrapper:nth-child(10) .char-conciertos { animation-delay: 0.9s; } .char-wrapper:nth-child(11) .char-conciertos { animation-delay: 1.0s; } .char-wrapper:nth-child(12) .char-conciertos { animation-delay: 1.1s; } .char-wrapper:nth-child(13) .char-conciertos { animation-delay: 1.2s; } .char-wrapper:nth-child(14) .char-conciertos { animation-delay: 1.3s; } .char-wrapper:nth-child(15) .char-conciertos { animation-delay: 1.4s; } .char-wrapper:nth-child(16) .char-conciertos { animation-delay: 1.5s; } .char-wrapper:nth-child(17) .char-conciertos { animation-delay: 1.6s; }

        .btn-gold { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; overflow: hidden; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); }
        .btn-gold:hover { transform: scale(1.03); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.6); filter: brightness(1.15); }
        
        .card-container { perspective: 2000px; position: relative; }
        .card-stark { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 20px; transition: transform 0.1s ease-out, box-shadow 0.2s ease, border-color 0.4s ease; overflow: hidden; transform-style: preserve-3d; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-stark .shine { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 5; }
        .card-stark:hover .shine { opacity: 1; }
        .card-stark::before, .card-stark::after { content: ""; position: absolute; width: 20px; height: 20px; background: #030303; border-radius: 50%; z-index: 10; }
        .card-stark::before { top: 62%; left: -10px; box-shadow: 1px 0 0 rgba(212,175,55,0.2) inset; }
        .card-stark::after { top: 62%; right: -10px; box-shadow: -1px 0 0 rgba(212,175,55,0.2) inset; }
        .card-stark:hover { border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 30px 70px rgba(0,0,0,0.9); }
        
        #lista-destacados .card-stark {
            border-color: rgba(212, 175, 55, 0.4);
            animation: pulse-gold 2.5s infinite alternate;
        }
        #lista-destacados .card-stark:hover {
            border-color: rgba(212, 175, 55, 1);
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.2); }
            100% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.5); border-color: rgba(212, 175, 55, 0.6); }
        }

        .card-location { transform: translateZ(50px); }
        .card-title { transform: translateZ(60px); }
        .card-details { transform: translateZ(40px); }
        .card-button { transform: translateZ(70px); }

        .text-green-neon { color: #00ff00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.7); }
        
        .marquee-container { width: 100%; height: 90px; overflow: hidden; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(168, 85, 247, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3); display: flex; align-items: center; position: relative; z-index: 20; }
        #banner-publicidad { display: flex; width: max-content; }
        .marquee-track { display: flex; flex-shrink: 0; animation: scroll-infinite 45s linear infinite; }
        .marquee-track img { height: 65px; width: auto; margin-right: 60px; filter: grayscale(1) opacity(0.6); transition: 0.3s ease; }
        .marquee-track img:hover { filter: grayscale(0) opacity(1); transform: scale(1.1) rotate(2deg); }
        @keyframes scroll-infinite { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .hud-counter { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(10, 10, 10, 0.85); border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); box-shadow: 0 5px 25px rgba(0,0,0,0.9); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: #bf953f; }

        #hologram-videos-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 5; 
        }
        .holo-video {
            position: fixed;
            width: 250px;
            border-radius: 15px;
            opacity: 0.3;
            filter: grayscale(80%) sepia(50%) hue-rotate(220deg); 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            pointer-events: auto; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.3, 1);
            animation: roam-video linear infinite; 
            border: 1px solid rgba(168, 85, 247, 0.3);
            z-index: 5;
        }
        .holo-video:hover {
            opacity: 1;
            filter: grayscale(0%) sepia(0%) hue-rotate(0deg);
            transform: scale(1.1) !important;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            border-color: rgba(212, 175, 55, 0.8);
            z-index: 50;
            animation-play-state: paused !important; 
        }
        @keyframes roam-video {
            0%   { transform: translate(0vw, 0vh); }
            25%  { transform: translate(25vw, 15vh); }
            50%  { transform: translate(-10vw, 30vh); }
            75%  { transform: translate(-25vw, 10vh); }
            100% { transform: translate(0vw, 0vh); }
        }

        .estado-soldout {
            background: linear-gradient(90deg, #6b0f0f, #991b1b);
            border: 1px solid #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }
        .estado-agotandose {
            background: linear-gradient(90deg, #9a3412, #c2410c);
            border: 1px solid #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.5);
            animation: pulse-fire 2s infinite;
        }
        @keyframes pulse-fire {
            0%, 100% { box-shadow: 0 0 10px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 25px rgba(249, 115, 22, 0.8); }
        }

        .card-stark.is-soldout {
            opacity: 0.6;
            filter: grayscale(50%);
        }
        .card-stark.is-soldout:hover {
            opacity: 0.8; filter: grayscale(30%); transform: none; box-shadow: none; border-color: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="selection:bg-gold selection:text-black overflow-x-hidden">

    <div id="hologram-videos-container"></div>

    <div class="ambient-light light-purple"></div>
    <div class="ambient-light light-gold"></div>
    <div class="particles"></div>

    <div class="hud-counter px-7 py-3.5 rounded-full text-right flex items-center gap-3.5 border-purple-500/20">
        <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500 shadow-[0_0_12px_#00ff00]"></span>
        </span>
        <span class="text-[11px] text-zinc-300 uppercase tracking-[0.25em] font-black">Servicio Premium</span>
        <span id="num-visitas" class="text-2xl font-black text-white tracking-tighter tabular-nums drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">...</span>
    </div>

    <header class="pt-32 pb-16 text-center relative px-4 z-10">
        <div class="max-w-6xl mx-auto relative z-10">

            <div id="super-logo" class="logo-container text-6xl md:text-8xl font-black tracking-tighter uppercase italic font-syncopate">
                </div>
            
            <div class="h-[2px] w-32 bg-gradient-to-r from-transparent via-gold to-transparent mx-auto mt-8 mb-8 opacity-50"></div>
            
            <div class="bg-black/60 border border-zinc-800/60 backdrop-blur-md p-5 md:p-6 rounded-2xl max-w-2xl mx-auto shadow-[0_10px_30px_rgba(0,0,0,0.7)] ring-1 ring-purple-500/10 relative z-20">
                <p class="text-zinc-300 text-xs md:text-sm font-light leading-relaxed tracking-wide">

    <main class="container mx-auto p-4 relative z-20">
        
        <div class="mb-16 max-w-2xl mx-auto relative group px-4">
            <div class="absolute inset-y-0 left-8 flex items-center pointer-events-none z-10">
                <svg class="w-5 h-5 text-zinc-600 group-focus-within:text-gold transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="buscador" onkeyup="filtrarEventos()" 
                placeholder="Busca tu acceso (Artista, Ciudad, Estadio)..." 
                class="w-full bg-black/80 border border-zinc-800/80 p-5 pl-16 pr-10 rounded-full text-sm focus:border-gold/70 focus:bg-black outline-none text-white transition-all backdrop-blur-xl shadow-2xl placeholder:text-zinc-600">
        </div>

        <div id="contenedor-destacados" class="hidden mb-20">

            </div>

    <footer class="py-12 text-center text-zinc-600 text-[10px] tracking-[0.5em] uppercase border-t border-zinc-900 relative z-20 bg-black backdrop-blur-md opacity-80">
        © 2026 Master Conciertos Protocol
    </footer>

    <script>
        const logoCont = document.getElementById('super-logo');
        const textMaster = "MASTER";
        const textConciertos = "CONCIERTOS";
        let logoHTML = '';
        textMaster.split('').forEach(char => { 
            let tx = (Math.random() - 0.5) * 100; let ty = (Math.random() * 120) + 20; let tr = (Math.random() - 0.5) * 180; let ts = (Math.random() * 1.5) + 0.8; 
            logoHTML += `<span class="char-wrapper" style="--tx: ${tx}vw; --ty: ${ty}vh; --tr: ${tr}deg; --ts: ${ts};"><span class="char-master">${char}</span></span>`; 
        });
        logoHTML += '<br>';
        textConciertos.split('').forEach(char => { 
            let tx = (Math.random() - 0.5) * 100; let ty = (Math.random() * 120) + 20; let tr = (Math.random() - 0.5) * 180; let ts = (Math.random() * 1.5) + 0.8; 
            logoHTML += `<span class="char-wrapper" style="--tx: ${tx}vw; --ty: ${ty}vh; --tr: ${tr}deg; --ts: ${ts};"><span class="char-conciertos">${char}</span></span>`; 
        });
        logoCont.innerHTML = logoHTML;

        window.addEventListener('scroll', () => {
            const logo = document.getElementById('super-logo');
            if (window.scrollY > 120) { logo.classList.add('scattered'); } else { logo.classList.remove('scattered'); }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAA83QincIrW2GyUWEcDkCLNAz6DAfGpPo",
            authDomain: "masterconciertos.firebaseapp.com",
            databaseURL: "https://masterconciertos-default-rtdb.firebaseio.com",
            projectId: "masterconciertos",
            storageBucket: "masterconciertos.firebasestorage.app",
            messagingSenderId: "819196526862",
            appId: "1:819196526862:web:27be1a0eee330d76a4975f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('visitas').transaction(c => (c || 0) + 1);
        db.ref('visitas').on('value', s => { document.getElementById('num-visitas').innerText = s.val()?.toLocaleString() || 0; });

        db.ref('publicidad').on('value', snap => {
            const container = document.getElementById('banner-publicidad');
            const section = document.getElementById('seccion-publi');
            container.innerHTML = '';
            if(snap.exists()){
                section.classList.remove('hidden');
                let rawHTML = '';
                snap.forEach(child => { rawHTML += `<img src="${child.val().foto}" alt="Sponsor">`; });
                let trackContent = ''; for(let i = 0; i < 15; i++) { trackContent += rawHTML; }
                container.innerHTML = `<div class="marquee-track">${trackContent}</div><div class="marquee-track">${trackContent}</div>`;
            } else { section.classList.add('hidden'); }
        });

        db.ref('eventos').on('value', snap => {
            const contenedorNormal = document.getElementById('lista-eventos');
            const contenedorDestacados = document.getElementById('lista-destacados');
            const seccionDestacados = document.getElementById('contenedor-destacados');
            const contenedorVideos = document.getElementById('hologram-videos-container');
            
            contenedorNormal.innerHTML = '';
            contenedorDestacados.innerHTML = '';
            contenedorVideos.innerHTML = '';
            
            let tieneDestacados = false;
            let videoIndex = 0;

            if(!snap.exists()){
                contenedorNormal.innerHTML = '<p class="text-zinc-500 text-center col-span-full py-10 italic">Actualizando red de accesos exclusivos...</p>';
                seccionDestacados.classList.add('hidden');
                return;
            }

            snap.forEach(child => {
                const evento = child.val();
                
                let strUbicacion = `📍 ${evento.ubicacion || 'Por definir'}`;
                if(evento.estadio) strUbicacion += ` | 🏟️ ${evento.estadio}`;

                let statusClase = "";
                let statusTexto = "";
                let cardClaseExtra = "";
                let botonHtml = "";
                const mensajeWa = encodeURIComponent(`Hola Master Conciertos. Solicito información para comprar boletas del evento: *${evento.nombre}*`);

                if(evento.estado === 'agotado') {
                    statusClase = "estado-soldout px-3 py-1 rounded-full text-[9px] text-white tracking-widest";
                    statusTexto = "SOLD OUT";
                    cardClaseExtra = "is-soldout";
                    botonHtml = `<button disabled class="card-button block w-full text-center bg-zinc-900 text-zinc-600 border border-zinc-800 py-3.5 rounded-xl text-xs uppercase tracking-[0.15em] cursor-not-allowed">NO DISPONIBLE</button>`;
                } else if (evento.estado === 'por_agotar') {
                    statusClase = "estado-agotandose px-3 py-1 rounded-full text-[9px] text-white tracking-widest";
                    statusTexto = "ÚLTIMAS BOLETAS";
                    botonHtml = `<a href="https://wa.me/573215159607?text=${mensajeWa}" target="_blank" class="card-button block w-full text-center btn-gold py-3.5 rounded-xl text-xs uppercase tracking-[0.15em] shadow-[0_5px_20px_rgba(212,175,55,0.3)]">COMPRAR BOLETAS</a>`;
                } else {
                    botonHtml = `<a href="https://wa.me/573215159607?text=${mensajeWa}" target="_blank" class="card-button block w-full text-center btn-gold py-3.5 rounded-xl text-xs uppercase tracking-[0.15em] shadow-[0_5px_20px_rgba(212,175,55,0.3)]">COMPRAR BOLETAS</a>`;
                }

                let cardHtml = `
                    <div class="card-container item-evento">
                        <div class="card-stark group ${cardClaseExtra}" data-tilt>
                            <div class="shine"></div> 
                            <div class="aspect-[4/5] w-full overflow-hidden relative bg-[#050505]">
                                <img src="${evento.foto}" alt="${evento.nombre}" class="w-full h-full object-cover object-top transition-transform duration-1000 group-hover:scale-110 z-0">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#000] via-[#000]/30 to-transparent opacity-95 pointer-events-none"></div>
                                <div class="absolute top-4 left-4 z-10 card-location">
                                    <span class="bg-black/95 backdrop-blur-md text-gold text-[9px] font-black px-4 py-1.5 rounded-full border border-gold/30 tracking-widest uppercase italic shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                                        ${strUbicacion}
                                    </span>
                                </div>
                            </div>
                            <div class="p-7 relative z-10 flex flex-col justify-between h-[250px]">
                                <h3 class="text-xl font-bold text-white uppercase leading-tight group-hover:text-gold transition-colors font-syncopate tracking-tight drop-shadow-md card-title">${evento.nombre}</h3>
                                
                                <div class="card-details">
                                    <div class="flex items-center justify-between mb-6 pb-4 border-b border-zinc-800/80">
                                        <div>
                                            <p class="text-zinc-500 text-[9px] uppercase tracking-wider font-bold mb-1">Fecha</p>
                                            <p class="font-black text-white text-xs italic tracking-wide">${evento.fecha}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="${statusClase} font-black uppercase italic">${statusTexto}</p>
                                        </div>
                                    </div>
                                    ${botonHtml}
                                </div>
                            </div>
                        </div>
                    </div>`;

                if(evento.destacado) {
                    contenedorDestacados.innerHTML += cardHtml;
                    tieneDestacados = true;
                } else {
                    contenedorNormal.innerHTML += cardHtml;
                }

                if(evento.videoPromo) {
                    let dur = Math.floor(Math.random() * 20) + 30; 
                    let delay = Math.floor(Math.random() * -30); 
                    let startX = Math.floor(Math.random() * 60) + 10; 
                    let startY = Math.floor(Math.random() * 60) + 10; 

                    contenedorVideos.innerHTML += `
                        <video src="${evento.videoPromo}" class="holo-video" autoplay loop muted playsinline 
                            style="left: ${startX}vw; top: ${startY}vh; animation-duration: ${dur}s; animation-delay: ${delay}s;">
                        </video>
                    `;
                }
            });

            if(tieneDestacados) {
                seccionDestacados.classList.remove('hidden');
            } else {
                seccionDestacados.classList.add('hidden');
            }

            activarTilt();
        });

        function activarTilt() {
            const cards = document.querySelectorAll('.card-stark:not(.is-soldout)'); 
            
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; 
                    const y = e.clientY - rect.top;  
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -15; 
                    const rotateY = ((x - centerX) / centerX) * 15;
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                    const shine = card.querySelector('.shine');
                    const shineX = (x / rect.width) * 100; const shineY = (y / rect.height) * 100;
                    shine.style.background = `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.25), transparent 80%)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transition = 'transform 0.5s ease, box-shadow 0.2s ease, border-color 0.4s ease';
                    card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                    const shine = card.querySelector('.shine'); shine.style.opacity = '0';
                    setTimeout(() => { card.style.transition = 'transform 0.1s ease-out, box-shadow 0.2s ease, border-color 0.4s ease'; }, 500);
                });

                card.addEventListener('mouseenter', () => { card.querySelector('.shine').style.opacity = '1'; });
            });
        }

        function filtrarEventos() {
            let input = document.getElementById('buscador').value.toLowerCase();
            let tarjetas = document.getElementsByClassName('item-evento');
            for (let i = 0; i < tarjetas.length; i++) {
                let texto = tarjetas[i].innerText.toLowerCase();
                tarjetas[i].style.display = texto.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
